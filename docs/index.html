<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Location Guessing Game</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="업로드된 이미지를 다중 AI 모델로 분석하여 촬영된 위치와 랜드마크를 추정합니다."
    />
    <meta property="og:title" content="AI 기반 위치 추정 서비스" />
    <meta
      property="og:description"
      content="업로드된 이미지를 다중 AI 모델로 분석하여 촬영된 위치와 랜드마크를 추정합니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/og-image.png" />
    <link rel="icon" href="./assets/favicon.png" />
    <style>
      /* 최소한의 이미지 크기 제약과 핏 스타일 지정 */
      .game-image-preview {
        max-height: 400px;
        object-fit: contain;
        width: 100%;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <!-- Header -->
      <header class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">GEO GUESSER: AI VS HUMAN</h1>
      </header>

      <div class="row g-4">
        <!-- LEFT PANEL: Upload & Action Controls -->
        <div class="col-lg-7">
          <div class="card shadow-sm position-relative">
            <!-- Win/Lose Overlay -->
            <div
              id="gameResultOverlay"
              class="position-absolute top-0 start-0 w-100 h-100 bg-dark bg-opacity-95 d-none flex-column align-items-center justify-content-center text-center p-4 rounded"
              style="z-index: 10; --bs-bg-opacity: 0.95"
            >
              <h2 id="resultBadge" class="display-3 fw-bold mb-3">AI 승리</h2>
              <p
                id="resultText"
                class="text-white-50 fs-5 mb-4"
                style="max-width: 500px"
              ></p>
              <button
                class="btn btn-primary btn-lg px-4"
                onclick="restartGame()"
              >
                다시 도전하기
              </button>
            </div>

            <!-- Card Header -->
            <div
              class="card-header bg-white d-flex justify-content-between align-items-center py-3"
            >
              <h5 class="card-title mb-0 fw-bold" id="panelTitle">
                위치 맞추기 게임 시작
              </h5>
              <!-- Turn Indicator (Badges) -->
              <div id="turnIndicators" class="d-flex gap-1">
                <span class="badge bg-secondary" id="dot-1">1</span>
                <span class="badge bg-secondary" id="dot-2">2</span>
                <span class="badge bg-secondary" id="dot-3">3</span>
                <span class="badge bg-secondary" id="dot-4">4</span>
                <span class="badge bg-secondary" id="dot-5">5</span>
              </div>
            </div>

            <!-- Card Body -->
            <div class="card-body p-4">
              <!-- STEP 1: Setup Game -->
              <div id="setupSection">
                <div class="mb-4">
                  <label class="form-label fw-bold">이미지 파일 업로드</label>
                  <input
                    type="file"
                    class="form-control"
                    id="imageInput"
                    accept="image/*"
                  />
                  <div class="form-text text-muted">
                    AI가 추측할 장소 사진을 업로드해 주세요.
                  </div>
                </div>

                <div class="mb-4">
                  <label for="firstHint" class="form-label fw-bold"
                    >첫 번째 힌트</label
                  >
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="firstHint"
                    placeholder="예: 아시아의 어느 사원입니다, 바닷가 근처입니다 등"
                  />
                </div>

                <button
                  class="btn btn-primary btn-lg w-100"
                  onclick="startGame()"
                >
                  AI 추론 시작
                </button>
              </div>

              <!-- STEP 2: Loading State -->
              <div id="loadingSection" class="text-center py-5 d-none">
                <div
                  class="spinner-border text-primary mb-3"
                  style="width: 3rem; height: 3rem"
                  role="status"
                ></div>
                <h5 class="fw-bold text-primary">AI가 분석하는 중...</h5>
                <p class="text-muted small">
                  Groq, NVIDIA NIM, OpenRouter 모델의 의견을 통합하고 있습니다.
                </p>
              </div>

              <!-- STEP 3: Guess Results -->
              <div id="guessSection" class="d-none">
                <h5 class="fw-bold text-primary border-bottom pb-2 mb-3">
                  AI 앙상블의 예측 결과
                </h5>

                <div class="row g-3 mb-4">
                  <div class="col-md-6">
                    <span class="text-muted d-block small">예상 랜드마크</span>
                    <strong class="fs-5" id="guessLandmark">-</strong>
                  </div>
                  <div class="col-md-6">
                    <span class="text-muted d-block small">신뢰도</span>
                    <strong class="fs-5 text-success" id="guessConfidence"
                      >-</strong
                    >
                  </div>
                  <div class="col-md-6">
                    <span class="text-muted d-block small"
                      >국가 / 지역 / 도시</span
                    >
                    <strong class="fs-6" id="guessLocation">-</strong>
                  </div>
                </div>

                <div class="p-3 bg-light rounded border mb-4">
                  <h6 class="fw-bold mb-1 small">추론 근거</h6>
                  <p
                    id="guessReason"
                    class="mb-0 text-secondary"
                    style="line-height: 1.6; font-size: 0.95rem"
                  ></p>
                </div>

                <!-- STEP 4: Feedback Choice -->
                <div
                  id="feedbackSection"
                  class="p-3 bg-light border border-primary rounded"
                >
                  <h6 class="fw-bold text-center mb-3">
                    AI가 위치를 맞추었습니까?
                  </h6>
                  <div class="row g-2" id="feedbackButtons">
                    <div class="col">
                      <button
                        class="btn btn-success w-100 py-2"
                        onclick="handleFeedback(true)"
                      >
                        예, 정답입니다 🎉
                      </button>
                    </div>
                    <div class="col">
                      <button
                        class="btn btn-danger w-100 py-2"
                        onclick="showNextHintInput()"
                      >
                        아니요, 틀렸습니다 ❌
                      </button>
                    </div>
                  </div>

                  <!-- Hidden next hint box -->
                  <div id="nextHintBox" class="mt-3 d-none">
                    <div class="mb-3">
                      <label
                        for="nextHint"
                        class="form-label fw-bold small text-primary"
                        >추가 힌트 입력</label
                      >
                      <textarea
                        id="nextHint"
                        class="form-control"
                        rows="3"
                        placeholder="예: 아니야, 이 나라는 일본이 아니고 한국이야 / 주위에 산이 보여 등"
                      ></textarea>
                    </div>
                    <button
                      class="btn btn-primary w-100"
                      onclick="submitNextHint()"
                    >
                      새 힌트 제출하여 다시 추측하기
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT PANEL: Image Display & History Timeline -->
        <div class="col-lg-5">
          <div class="card shadow-sm mb-4">
            <div class="card-header bg-white py-3">
              <h5 class="card-title mb-0 fw-bold">제출된 이미지</h5>
            </div>
            <div class="card-body p-0 text-center">
              <div
                id="imagePlaceholder"
                class="py-5 text-muted bg-light border-bottom"
              >
                <span class="fs-1 d-block mb-2">📷</span>
                <span>이미지를 업로드하면 여기에 표시됩니다</span>
              </div>
              <img
                id="gameImage"
                class="game-image-preview d-none img-fluid rounded-bottom"
                alt="제출 이미지"
              />
            </div>
          </div>

          <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
              <h5 class="card-title mb-0 fw-bold">진행 기록</h5>
            </div>
            <div class="card-body p-3">
              <div
                class="list-group list-group-flush overflow-auto"
                id="historyTimeline"
                style="max-height: 350px"
              >
                <p
                  id="emptyHistoryText"
                  class="text-muted text-center py-4 my-0"
                >
                  게임이 시작되면 힌트와 AI 예측 결과가 여기에 기록됩니다.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/bootstrap.bundle.min.js"></script>

    <script>
      let currentTurn = 1;
      const maxTurns = 5;
      let imageBase64 = "";
      let history = []; // { hint: string, guess: object }

      // 이미지 선택 및 로드 시 미리보기 설정
      document.querySelector("#imageInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          imageBase64 = reader.result.split(",")[1];

          document.querySelector("#imagePlaceholder").classList.add("d-none");
          const gameImage = document.querySelector("#gameImage");
          gameImage.src = reader.result;
          gameImage.classList.remove("d-none");
        };
        reader.readAsDataURL(file);
      });

      // 턴 뱃지 업데이트
      function updateTurnDots() {
        for (let i = 1; i <= maxTurns; i++) {
          const dot = document.querySelector(`#dot-${i}`);
          dot.className = "badge";
          if (i < currentTurn) {
            dot.classList.add("bg-success");
          } else if (i === currentTurn) {
            dot.classList.add("bg-primary");
          } else {
            dot.classList.add("bg-secondary");
          }
        }
      }

      // 게임 시작
      async function startGame() {
        if (!imageBase64) {
          alert("이미지를 먼저 업로드해 주세요!");
          return;
        }

        const firstHint = document.querySelector("#firstHint").value;
        if (!firstHint.trim()) {
          alert("AI에게 도움이 될 첫 번째 힌트를 입력해 주세요!");
          return;
        }

        await requestGuess(firstHint);
      }

      // 서버에 위치 예측 요청
      async function requestGuess(hintText) {
        document.querySelector("#setupSection").classList.add("d-none");
        document.querySelector("#guessSection").classList.add("d-none");
        document.querySelector("#loadingSection").classList.remove("d-none");

        updateTurnDots();

        try {
          const response = await fetch(
            "https://two0260605.onrender.com/analyze",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                image: imageBase64,
                hint: hintText,
                history: history,
              }),
            },
          );

          const data = await response.json();
          console.log(data);

          if (response.status !== 200) {
            throw new Error(data.error || "서버 통신 중 에러가 발생했습니다.");
          }

          const guess = data.final;

          document.querySelector("#loadingSection").classList.add("d-none");
          document.querySelector("#guessSection").classList.remove("d-none");

          // AI 예측 결과 표시
          document.querySelector("#guessLandmark").textContent = guess.landmark;
          document.querySelector("#guessConfidence").textContent =
            `${guess.confidence}%`;
          document.querySelector("#guessLocation").textContent =
            `${guess.country} ${guess.region || ""} ${guess.city || ""}`;
          document.querySelector("#guessReason").textContent = guess.reason;

          window.latestGuess = guess;
          window.latestHint = hintText;
        } catch (err) {
          alert(`에러 발생: ${err.message}`);
          document.querySelector("#loadingSection").classList.add("d-none");

          if (currentTurn === 1) {
            document.querySelector("#setupSection").classList.remove("d-none");
          } else {
            document.querySelector("#guessSection").classList.remove("d-none");
            document.querySelector("#nextHintBox").classList.remove("d-none");
          }
        }
      }

      // 피드백 처리
      function handleFeedback(isCorrect) {
        if (isCorrect) {
          endGame(true);
        } else {
          history.push({
            hint: window.latestHint,
            guess: window.latestGuess,
          });

          updateHistoryTimeline();

          if (currentTurn >= maxTurns) {
            endGame(false);
          } else {
            document.querySelector("#nextHint").value = "";
            document.querySelector("#nextHintBox").classList.remove("d-none");
            document.querySelector("#feedbackButtons").classList.add("d-none");
          }
        }
      }

      function showNextHintInput() {
        handleFeedback(false);
      }

      // 추가 힌트 제출
      async function submitNextHint() {
        const nextHintText = document.querySelector("#nextHint").value;
        if (!nextHintText.trim()) {
          alert("AI가 새로운 장소를 생각할 수 있도록 힌트를 입력해 주세요.");
          return;
        }

        currentTurn += 1;
        document.querySelector("#feedbackButtons").classList.remove("d-none");
        document.querySelector("#nextHintBox").classList.add("d-none");

        await requestGuess(nextHintText);
      }

      // 히스토리 리스트 업데이트
      function updateHistoryTimeline() {
        const timeline = document.querySelector("#historyTimeline");
        const emptyText = document.querySelector("#emptyHistoryText");
        if (emptyText) emptyText.remove();

        timeline.innerHTML = "";
        history.forEach((h, idx) => {
          const item = document.createElement("div");
          item.className = "list-group-item list-group-item-action py-3";
          item.innerHTML = `
            <div class="d-flex w-100 justify-content-between mb-1">
              <h6 class="fw-bold mb-1 text-danger">시도 ${idx + 1} (오답)</h6>
              <small class="text-muted">Turn ${idx + 1}</small>
            </div>
            <p class="mb-1 text-secondary small"><strong>내 힌트:</strong> ${h.hint}</p>
            <p class="mb-1 text-secondary small"><strong>AI의 오답:</strong> ${h.guess.country} ${h.guess.city || ""} - ${h.guess.landmark}</p>
            <small class="text-black-50 d-block mt-1">${h.guess.reason}</small>
          `;
          timeline.appendChild(item);
        });
        timeline.scrollTop = timeline.scrollHeight;
      }

      // 게임 결과 출력
      function endGame(aiWon) {
        const overlay = document.querySelector("#gameResultOverlay");
        const badge = document.querySelector("#resultBadge");
        const text = document.querySelector("#resultText");

        overlay.classList.remove("d-none");
        overlay.classList.add("d-flex");

        if (aiWon) {
          badge.textContent = "AI 승리! 🏆";
          badge.className = "display-3 fw-bold mb-3 text-success";
          text.textContent = `AI가 ${currentTurn}번째 시도 끝에 정확하게 정답인 [${window.latestGuess.landmark}]을(를) 맞추었습니다.`;
        } else {
          badge.textContent = "인간 승리! 🧑‍💻";
          badge.className = "display-3 fw-bold mb-3 text-danger";
          text.textContent = `AI가 5번의 힌트 제공에도 불구하고 정답을 맞추지 못했습니다.`;
        }
      }

      // 게임 리셋
      function restartGame() {
        currentTurn = 1;
        history = [];
        imageBase64 = "";
        window.latestGuess = null;
        window.latestHint = null;

        const overlay = document.querySelector("#gameResultOverlay");
        overlay.classList.remove("d-flex");
        overlay.classList.add("d-none");

        document.querySelector("#setupSection").classList.remove("d-none");
        document.querySelector("#guessSection").classList.add("d-none");
        document.querySelector("#imagePlaceholder").classList.remove("d-none");

        const gameImage = document.querySelector("#gameImage");
        gameImage.src = "";
        gameImage.classList.add("d-none");

        document.querySelector("#imageInput").value = "";
        document.querySelector("#firstHint").value = "";

        const timeline = document.querySelector("#historyTimeline");
        timeline.innerHTML = `
          <p id="emptyHistoryText" class="text-muted text-center py-4 my-0">
            게임이 시작되면 힌트와 AI 예측 결과가 여기에 기록됩니다.
          </p>
        `;

        updateTurnDots();
      }
    </script>
  </body>
</html>
